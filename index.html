<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRUMP JUMP: Strait of Hormuz</title>
<meta name="description" content="Jump, dodge drones & missiles, and climb the global leaderboard. Play free!">
<link rel="icon" type="image/png" href="assets/brand/icon.png">
<link rel="apple-touch-icon" href="assets/brand/icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Trump Jump">
<meta property="og:title" content="Trump Jump: Strait of Hormuz">
<meta property="og:description" content="Jump, dodge drones & missiles, and climb the global leaderboard. Play free!">
<meta property="og:url" content="https://trump-jump-hormuz.vercel.app/">
<meta property="og:image" content="https://trump-jump-hormuz.vercel.app/assets/brand/og.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Trump Jump: Strait of Hormuz">
<meta name="twitter:description" content="Jump, dodge drones & missiles, and climb the global leaderboard. Play free!">
<meta name="twitter:image" content="https://trump-jump-hormuz.vercel.app/assets/brand/og.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100dvh;
    overflow: hidden;
    background: radial-gradient(1200px 800px at 50% 20%, #16203f 0%, #0a0e22 55%, #05070f 100%);
    font-family: Arial, sans-serif;
  }
  #game {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game canvas {
    border-radius: 10px;
    box-shadow: 0 0 80px rgba(246, 198, 103, 0.18), 0 10px 40px rgba(0, 0, 0, 0.6);
    touch-action: none;
  }
  #name-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 7, 15, 0.7);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #name-modal .box {
    position: relative;
    background: #16203f;
    border: 2px solid #f5c542;
    border-radius: 14px;
    padding: 22px 24px;
    width: 280px;
    max-width: 80vw;
    text-align: center;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
    font-family: "Luckiest Guy", Arial, sans-serif;
  }
  #name-modal .m-close {
    position: absolute; top: 6px; right: 12px; background: none; border: none;
    color: #ffd9a8; font-size: 26px; line-height: 1; cursor: pointer;
    font-family: Arial, sans-serif; padding: 2px 4px;
  }
  #name-modal .m-close:hover { color: #fff; }
  #name-modal h3 { color: #f5c542; margin: 0 0 14px; letter-spacing: 1px; }
  #name-input {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 12px;
    border-radius: 10px;
    border: 2px solid #f5c542;
    background: #0a0e22;
    color: #fff;
    font-size: 18px;
    outline: none;
  }
  #name-save {
    margin-top: 14px;
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 10px;
    background: #c9312b;
    color: #fff;
    font-size: 18px;
    font-family: "Luckiest Guy", Arial, sans-serif;
    cursor: pointer;
  }
  #account-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 7, 15, 0.7);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #account-modal .box {
    position: relative;
    background: #16203f;
    border: 2px solid #f5c542;
    border-radius: 14px;
    padding: 22px 24px;
    width: 300px;
    max-width: 82vw;
    text-align: center;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
    font-family: "Luckiest Guy", Arial, sans-serif;
  }
  #account-modal .m-close {
    position: absolute;
    top: 6px;
    right: 12px;
    background: none;
    border: none;
    color: #ffd9a8;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    font-family: Arial, sans-serif;
    padding: 2px 4px;
  }
  #account-modal .m-close:hover { color: #fff; }
  #account-modal h3 { color: #f5c542; margin: 0 0 8px; letter-spacing: 1px; }
  #account-modal .m-sub {
    color: #ffd9a8; font-family: Arial, sans-serif; font-size: 13px; margin: 0 0 16px;
  }
  .m-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; box-sizing: border-box; margin: 8px 0 0; padding: 11px;
    border: none; border-radius: 10px; font-size: 16px;
    font-family: "Luckiest Guy", Arial, sans-serif; cursor: pointer; color: #fff;
  }
  .m-btn.google { background: #4285f4; }
  .m-btn.danger { background: #c9312b; }
  .m-btn.ghost { background: transparent; border: 2px solid #3a4a6a; color: #ffd9a8; }
  .m-btn .gi {
    width: 18px; height: 18px; background: #fff; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #4285f4; font-weight: bold; font-family: Arial, sans-serif; font-size: 13px;
  }
  #settings-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(5, 7, 15, 0.7);
    align-items: center; justify-content: center; z-index: 50;
  }
  #settings-modal .box {
    position: relative; background: #16203f; border: 2px solid #f5c542;
    border-radius: 14px; padding: 22px 24px; width: 300px; max-width: 82vw;
    text-align: center; box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
    font-family: "Luckiest Guy", Arial, sans-serif;
  }
  #settings-modal .m-close {
    position: absolute; top: 6px; right: 12px; background: none; border: none;
    color: #ffd9a8; font-size: 26px; line-height: 1; cursor: pointer;
    font-family: Arial, sans-serif; padding: 2px 4px;
  }
  #settings-modal .m-close:hover { color: #fff; }
  #settings-modal h3 { color: #f5c542; margin: 0 0 8px; letter-spacing: 1px; }
  #settings-modal .m-sub {
    color: #ffd9a8; font-family: Arial, sans-serif; font-size: 13px; margin: 0 0 14px;
  }
  #code-input {
    width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px;
    border: 2px solid #f5c542; background: #0a0e22; color: #fff; font-size: 18px;
    outline: none; text-align: center; letter-spacing: 3px;
  }
  #code-msg { min-height: 18px; margin: 12px 0 0; font-size: 14px; font-family: Arial, sans-serif; }
  #pfp-grid { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  #pfp-grid .pfp-row { display: flex; gap: 10px; justify-content: center; }
  #pfp-grid .pfp {
    width: 46px; height: 46px; border-radius: 50%; overflow: hidden; padding: 0;
    border: 2px solid #3a4a6a; background: #0a0e22; cursor: pointer; flex: 0 0 auto;
  }
  #pfp-grid .pfp img {
    width: 118%; height: auto; display: block; margin: -2% 0 0 -9%;
  }
  #pfp-grid .pfp.sel { border-color: #f5c542; box-shadow: 0 0 0 2px rgba(245, 197, 66, 0.45); }
  /* boot splash — shown instantly (pure CSS, no assets to wait on except the
     small icon), removed by the Menu scene once the game is ready to render */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: radial-gradient(1200px 800px at 50% 20%, #16203f 0%, #0a0e22 55%, #05070f 100%);
    opacity: 1;
    transition: opacity 0.35s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash img {
    width: 96px;
    height: 96px;
    border-radius: 22px;
    box-shadow: 0 0 60px rgba(246, 198, 103, 0.25);
    animation: splash-pulse 1.6s ease-in-out infinite;
  }
  #splash .s-title {
    font-family: "Luckiest Guy", "Arial Black", Arial, sans-serif;
    font-size: 34px;
    color: #f5c542;
    letter-spacing: 2px;
    text-shadow: 0 3px 0 #71301f;
  }
  #splash .s-sub {
    font-family: "Luckiest Guy", "Arial Black", Arial, sans-serif;
    font-size: 15px;
    color: #ffe9c9;
    letter-spacing: 3px;
    margin-top: -8px;
  }
  #splash .s-spin {
    width: 30px;
    height: 30px;
    margin-top: 10px;
    border-radius: 50%;
    border: 4px solid rgba(245, 197, 66, 0.25);
    border-top-color: #f5c542;
    animation: splash-spin 0.9s linear infinite;
  }
  @keyframes splash-spin { to { transform: rotate(360deg); } }
  @keyframes splash-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
</style>
</head>
<body>
<div id="splash">
  <img src="assets/brand/icon.png" alt="">
  <div class="s-title">TRUMP JUMP</div>
  <div class="s-sub">STRAIT OF HORMUZ</div>
  <div class="s-spin"></div>
</div>
<script>
  // removed by the Menu scene when the game is ready; the timer is a failsafe
  // so a stalled load never leaves the game hidden behind the splash forever
  window.hideSplash = function () {
    var s = document.getElementById('splash');
    if (!s) return;
    s.classList.add('hide');
    setTimeout(function () { s.remove(); }, 400);
  };
  setTimeout(window.hideSplash, 12000);
</script>
<div id="game"></div>
<div id="name-modal">
  <div class="box">
    <button class="m-close" id="name-close">&times;</button>
    <h3>PICK A NAME</h3>
    <input id="name-input" maxlength="16" placeholder="your name" autocomplete="off">
    <button id="name-save">SAVE</button>
  </div>
</div>
<div id="account-modal">
  <div class="box" id="account-box"></div>
</div>
<div id="settings-modal">
  <div class="box">
    <button class="m-close" id="settings-close">&times;</button>
    <h3>SETTINGS</h3>
    <button class="m-btn ghost" id="mute-toggle">🔊 SOUND: ON</button>
    <button class="m-btn ghost" id="boost-side-toggle" style="margin-top: 8px;">🚀 BOOST: RIGHT</button>
    <p class="m-sub" style="margin-top: 18px;">Have a friend code? Enter it to unlock a bonus skin.</p>
    <input id="code-input" maxlength="16" placeholder="enter code" autocomplete="off" inputmode="numeric">
    <button class="m-btn danger" id="code-redeem">REDEEM</button>
    <p class="m-sub" id="code-msg"></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script src="src/config/firebase-config.js"></script>
<script src="src/config/catalog.js"></script>
<script src="src/systems/save.js"></script>
<script src="src/systems/audio.js"></script>
<script src="src/systems/voice.js"></script>
<script src="src/gfx/textures.js"></script>
<script src="src/scenes/menu.js"></script>
<script src="src/scenes/shop.js"></script>
<script src="src/scenes/leaderboard.js"></script>
<script src="src/scenes/game.js"></script>
<script src="src/main.js"></script>
<script type="module" src="src/systems/firebase.js"></script>
</body>
</html>
